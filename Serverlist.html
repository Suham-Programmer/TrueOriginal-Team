<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Server</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#3498db,#2c3e50);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:400px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    text-align:center;
}

h1{
    margin-bottom:20px;
    color:#2c3e50;
}

.server-list{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.server-list button{
    padding:15px;
    border:none;
    border-radius:6px;
    background:#3498db;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.server-list button:hover{
    background:#2980b9;
}
.back-home{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
}

.back-home a{
    text-decoration:none;
    color:white;
    font-size:18px;
    font-weight:bold;
    background:#2c3e50;
    padding:10px 20px;
    border-radius:6px;
    transition:0.3s;
}

.back-home a:hover{
    background:#1a252f;
}
</style>

</head>
<body>

<div class="container">

<h1>Select Your Server</h1>

<div class="server-list">

<button onclick="openServer('Appple MC')">Apple MC</button>

<button onclick="openServer('Fire MC')">Fire MC</button>

</div>

</div>

</div>

</body>
</html>
