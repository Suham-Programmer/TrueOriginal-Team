<title>Select Server</title>

<style>
*{
    margin:0;

    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#3498db,#2c3e50);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:400px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,.3);

}

h1{
    margin-bottom:20px;
    color:#2c3e50;
}

.server-list{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.server-list button{
    padding:15px;
    border:none;
    border-radius:6px;
    background:#3498db;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.server-list button:hover{
    background:#2980b9;
}
</style>

</head>
<body>

<h1>Select Your Server</h1>

<div class="server-list">

</div>
